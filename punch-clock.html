<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>打卡提醒</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #1a1a1a; color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .header { width: 100%; max-width: 500px; margin-bottom: 30px; text-align: center; }
        .current-time { font-size: 2rem; margin: 10px 0; color: #4CAF50; }
        .settings { background: #2d2d2d; padding: 25px; border-radius: 12px; width: 100%; max-width: 500px; margin-bottom: 30px; }
        .setting-item { margin-bottom: 20px; }
        .setting-item label { display: block; margin-bottom: 8px; font-weight: bold; }
        .time-input { display: flex; gap: 10px; align-items: center; }
        .time-input input { width: 70px; padding: 8px; border-radius: 6px; border: none; text-align: center; font-size: 1rem; }
        .week-checkboxes { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 8px; }
        .week-checkboxes label { display: flex; align-items: center; gap: 5px; padding: 8px 12px; background: #3d3d3d; border-radius: 6px; cursor: pointer; }
        .week-checkboxes input { cursor: pointer; }
        .btn { background: #4CAF50; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 1rem; cursor: pointer; transition: background 0.3s; }
        .btn:hover { background: #45a049; }
        .status { margin-top: 15px; font-size: 0.9rem; color: #aaa; }
        .reminder-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #ff0000; color: white; display: none; justify-content: center; align-items: center; flex-direction: column; z-index: 9999; }
        .reminder-overlay.active { display: flex; animation: flash 0.5s infinite alternate; }
        @keyframes flash { from { opacity: 1; } to { opacity: 0.7; } }
        .reminder-text { font-size: 3rem; font-weight: bold; margin-bottom: 20px; }
        .close-btn { background: white; color: #ff0000; border: none; padding: 15px 30px; border-radius: 8px; font-size: 1.2rem; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <h1>上下班打卡提醒</h1>
        <div class="current-time" id="currentTime">--:--:--</div>
    </div>

    <div class="settings">
        <div class="setting-item">
            <label>上班提醒时间</label>
            <div class="time-input">
                <input type="number" id="startHour" min="0" max="23" placeholder="时">
                <span>:</span>
                <input type="number" id="startMin" min="0" max="59" placeholder="分">
            </div>
        </div>

        <div class="setting-item">
            <label>下班提醒时间</label>
            <div class="time-input">
                <input type="number" id="endHour" min="0" max="23" placeholder="时">
                <span>:</span>
                <input type="number" id="endMin" min="0" max="59" placeholder="分">
            </div>
        </div>

        <div class="setting-item">
            <label>提醒星期</label>
            <div class="week-checkboxes">
                <label><input type="checkbox" value="1" checked> 周一</label>
                <label><input type="checkbox" value="2" checked> 周二</label>
                <label><input type="checkbox" value="3" checked> 周三</label>
                <label><input type="checkbox" value="4" checked> 周四</label>
                <label><input type="checkbox" value="5" checked> 周五</label>
                <label><input type="checkbox" value="6"> 周六</label>
                <label><input type="checkbox" value="0"> 周日</label>
            </div>
        </div>

        <button class="btn" onclick="saveSettings()">保存设置</button>
        <div class="status" id="statusText">提示：点击保存设置生效</div>
    </div>

    <div class="reminder-overlay" id="reminderOverlay">
        <div class="reminder-text">⚠️ 打卡时间到！</div>
        <button class="close-btn" onclick="closeReminder()">我已打卡</button>
    </div>

    <script>
        // 从本地存储加载设置
        let settings = JSON.parse(localStorage.getItem('punchSettings')) || {
            startHour: 9, startMin: 20,
            endHour: 18, endMin: 10,
            weeks: [1,2,3,4,5]
        };

        // 初始化界面
        function init() {
            document.getElementById('startHour').value = settings.startHour;
            document.getElementById('startMin').value = settings.startMin;
            document.getElementById('endHour').value = settings.endHour;
            document.getElementById('endMin').value = settings.endMin;
            
            document.querySelectorAll('.week-checkboxes input').forEach(cb => {
                cb.checked = settings.weeks.includes(parseInt(cb.value));
            });
        }

        // 保存设置
        function saveSettings() {
            settings.startHour = parseInt(document.getElementById('startHour').value) || 0;
            settings.startMin = parseInt(document.getElementById('startMin').value) || 0;
            settings.endHour = parseInt(document.getElementById('endHour').value) || 0;
            settings.endMin = parseInt(document.getElementById('endMin').value) || 0;
            
            settings.weeks = [];
            document.querySelectorAll('.week-checkboxes input:checked').forEach(cb => {
                settings.weeks.push(parseInt(cb.value));
            });

            localStorage.setItem('punchSettings', JSON.stringify(settings));
            document.getElementById('statusText').textContent = '✅ 设置已保存！';
            setTimeout(() => document.getElementById('statusText').textContent = '', 2000);
        }

        // 显示提醒
        function showReminder() {
            document.getElementById('reminderOverlay').classList.add('active');
            // 播放提示音
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            oscillator.type = 'sine';
            oscillator.frequency.value = 800;
            oscillator.connect(audioCtx.destination);
            oscillator.start();
            setTimeout(() => oscillator.stop(), 500);
        }

        // 关闭提醒
        function closeReminder() {
            document.getElementById('reminderOverlay').classList.remove('active');
        }

        // 时间更新和检查
        function checkTime() {
            const now = new Date();
            const h = now.getHours();
            const m = now.getMinutes();
            const s = now.getSeconds();
            const w = now.getDay(); // 0=周日,1=周一...6=周六

            // 更新当前时间显示
            document.getElementById('currentTime').textContent = 
                `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;

            // 检查是否到了提醒时间
            if (settings.weeks.includes(w)) {
                // 上班提醒
                if (h === settings.startHour && m === settings.startMin && s === 0) {
                    showReminder();
                }
                // 下班提醒
                if (h === settings.endHour && m === settings.endMin && s === 0) {
                    showReminder();
                }
            }
        }

        // 初始化并每秒更新
        init();
        setInterval(checkTime, 1000);
    </script>
</body>
</html>
