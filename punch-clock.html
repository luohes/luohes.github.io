<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="定时提醒">
<meta name="theme-color" content="#0d0d0d">
<meta name="mobile-web-app-capable" content="yes">
<meta name="format-detection" content="telephone=no">
<link rel="manifest" href="punch-manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="apple-touch-startup-image" href="icon-512.png">
<title>定时提醒</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
body{background:#0d0d0d;color:#fff;min-height:100vh;overflow:hidden;-webkit-user-select:none;user-select:none}

/* ===== 主界面 ===== */
#mainPage{display:flex;justify-content:center;align-items:center;width:100%;height:100vh;position:relative}
#mainTime{font-size:clamp(4rem,15vw,10rem);font-weight:bold;color:#00ff88;letter-spacing:4px;text-shadow:0 0 40px rgba(0,255,136,0.3);user-select:none}
#mainDate{font-size:clamp(0.9rem,2.5vw,1.3rem);color:#888;margin-top:12px;letter-spacing:2px;user-select:none}

/* 设置按钮 */
#settingsBtn{position:fixed;bottom:30px;right:30px;width:60px;height:60px;border-radius:50%;background:rgba(255,255,255,0.1);border:2px solid rgba(255,255,255,0.2);color:#fff;font-size:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;z-index:100}
#settingsBtn:hover{background:rgba(255,255,255,0.2);transform:rotate(60deg)}
#settingsBtn:active{background:rgba(255,255,255,0.25);transform:rotate(60deg) scale(0.9)}

/* ===== 设置界面 ===== */
#settingsPage{display:none;position:fixed;top:0;left:0;right:0;bottom:0;width:100vw;height:100vh;background:#1a1a1a;z-index:200;overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;-ms-overflow-style:none}
#settingsPage::-webkit-scrollbar{display:none}
#settingsPage.visible{display:block}
#settingsPage .container{padding:0 5vw 12vh 5vw;min-height:100vh}
#settingsPage h1{margin-top:6vh;text-align:center;margin-bottom:3vh;font-size:7vw;color:#00ff88}
#settingsPage .back-btn{position:fixed;top:5.5vh;left:5vw;width:10vw;height:10vw;border-radius:50%;background:rgba(255,255,255,0.1);border:none;color:#fff;font-size:5vw;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:201}

.setting-item{margin-bottom:2.5vh}
.setting-item label{display:block;margin-bottom:1vh;font-weight:bold;color:#ccc;font-size:5vw}
.time-input{display:flex;gap:1.5vw;align-items:center;flex-wrap:nowrap}
.time-input input{width:20vw;height:10vw;padding:0;border-radius:1.5vw;border:none;text-align:center;font-size:4.5vw;background:#2d2d2d;color:#fff;flex-shrink:0;box-sizing:border-box}
.time-input input#dateYr,
.time-input input#dateMon,
.time-input input#dateDay,
.time-input input#dateHr,
.time-input input#dateMin{width:13vw}
.time-input span{font-size:3vw;color:#888;flex-shrink:0}
.week-checkboxes{display:flex;flex-wrap:wrap;gap:1.5vw;margin-top:1vh}
.week-checkboxes label{display:flex;align-items:center;gap:1vw;padding:1.5vh 2.5vw;background:#2d2d2d;border-radius:1.5vw;cursor:pointer;color:#ccc;font-size:3.5vw;font-weight:normal}
.week-checkboxes input{accent-color:#00ff88;width:4vw;height:4vw;cursor:pointer}

.btn-row{position:fixed;bottom:12vh;left:0;right:0;display:flex;justify-content:center;gap:2vw;z-index:201;padding:0 5vw}
.btn{width:42vw;height:12vw;border-radius:2vw;font-size:5vw;cursor:pointer;border:none;transition:all .15s;text-align:center;font-weight:bold;flex:none;display:flex;align-items:center;justify-content:center}
.btn:active{transform:scale(0.96);opacity:0.85}
.btn-save{background:#00ff88;color:#0d0d0d}
.btn-save:hover{background:#00cc6a}
.btn-save:active{background:#00aa55}
.btn-test{background:#ff4757;color:#fff}
.btn-test:hover{background:#e0394a}
.btn-test:active{background:#c03040}
.status{margin-top:1vh;font-size:3.5vw;color:#888;text-align:center;min-height:5vw}

/* ===== 提醒弹窗 ===== */
#reminderOverlay{position:fixed;top:0;left:0;width:100%;height:100%;background:#1a1a1a;color:#fff;display:none;justify-content:center;align-items:center;flex-direction:column;z-index:9999}
#reminderOverlay.active{display:flex}
#reminderOverlay .reminder-text{font-size:clamp(2rem,8vw,3.5rem);font-weight:bold;margin-bottom:25px;text-align:center}
#reminderOverlay .close-btn{background:#fff;color:#ff0000;border:none;padding:15px 40px;border-radius:10px;font-size:1.2rem;cursor:pointer;font-weight:bold;transition:all .15s}
#reminderOverlay .close-btn:active{transform:scale(0.95);opacity:0.8}

/* ===== 通知引导弹窗 ===== */
#notifyGuide{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.75);display:none;justify-content:center;align-items:center;z-index:9998}
#notifyGuide.active{display:flex}
#notifyGuide .guide-card{background:#1a1a1a;border-radius:16px;padding:30px 24px;max-width:340px;width:90%;text-align:center}
#notifyGuide .guide-card .guide-icon{font-size:3rem;margin-bottom:12px}
#notifyGuide .guide-card h2{font-size:1.3rem;color:#fff;margin-bottom:10px}
#notifyGuide .guide-card p{font-size:0.9rem;color:#888;line-height:1.6;margin-bottom:24px}
#notifyGuide .guide-card .guide-btn{display:block;width:100%;padding:14px 0;border-radius:10px;font-size:1.05rem;font-weight:bold;cursor:pointer;border:none;transition:all .15s}
#notifyGuide .guide-card .guide-btn:active{transform:scale(0.96)}
#notifyGuide .guide-card .btn-enable{background:#00ff88;color:#0d0d0d;margin-bottom:10px}
#notifyGuide .guide-card .btn-later{background:transparent;color:#666;font-weight:normal}

/* ===== 主界面微调（小屏手机） ===== */
@media (max-width: 500px) {
  #mainTime{letter-spacing:2px}
  #settingsBtn{bottom:3vh;right:3vw;width:12vw;height:12vw;font-size:6vw}
}

/* ===== 电脑端适配（屏幕宽度 > 600px） ===== */
@media (min-width: 601px) {
  /* --- 主界面时钟 --- */
  #mainTime{font-size:5rem;letter-spacing:6px}
  #mainDate{font-size:1.2rem;margin-top:16px}
  #settingsBtn{bottom:40px;right:40px;width:54px;height:54px;font-size:22px}

  /* --- 设置弹窗：可见时居中卡片 450px --- */
  #settingsPage.visible{display:flex;justify-content:center;align-items:flex-start}
  #settingsPage .container{max-width:450px;width:100%;padding:0 20px 100px 20px;min-height:auto}
  #settingsPage h1{font-size:28px;margin-top:40px;margin-bottom:24px}
  #settingsPage .back-btn{position:fixed;top:40px;left:calc(50% - 215px);width:40px;height:40px;font-size:18px;z-index:201}

  .setting-item{margin-bottom:20px}
  .setting-item label{font-size:16px;margin-bottom:8px}
  .time-input{gap:8px}
  .time-input input{width:80px;height:44px;font-size:16px;border-radius:6px}
  .time-input input#dateYr,
  .time-input input#dateMon,
  .time-input input#dateDay,
  .time-input input#dateHr,
  .time-input input#dateMin{width:56px}
  .time-input span{font-size:13px}
  .week-checkboxes{gap:6px;margin-top:8px}
  .week-checkboxes label{font-size:14px;padding:6px 12px;gap:4px;border-radius:6px}
  .week-checkboxes input{width:16px;height:16px}

  .btn-row{position:fixed;bottom:0;left:50%;transform:translateX(-50%);max-width:450px;width:100%;padding:0 20px 16px 20px;gap:10px;z-index:201}
  .btn{width:auto;flex:1;height:48px;font-size:17px;border-radius:8px}

  .status{font-size:14px;margin-top:8px;min-height:20px}

  /* --- 提醒弹窗 --- */
  #reminderOverlay .reminder-text{font-size:2.2rem;margin-bottom:30px}
  #reminderOverlay .close-btn{padding:16px 48px;font-size:1.3rem}
}
</style>
</head>
<body>

<!-- ===== 主界面 ===== -->
<div id="mainPage">
  <div style="text-align:center">
    <div id="mainTime">--:--:--</div>
    <div id="mainDate">----年--月--日 星期-</div>
  </div>
  <button id="settingsBtn" onclick="openSettings()" title="设置">⚙</button>
</div>

<!-- ===== 设置界面 ===== -->
<div id="settingsPage" onclick="if(event.target===this)closeSettings()">
  <button class="back-btn" onclick="closeSettings()">←</button>
  <div class="container" onclick="event.stopPropagation()">
    <h1>⚙ 定时提醒设置</h1>

    <div class="setting-item">
      <label>上午提醒</label>
      <div class="time-input">
        <input type="number" id="t1h" min="0" max="23" placeholder="时">
        <span>:</span>
        <input type="number" id="t1m" min="0" max="59" placeholder="分">
      </div>
    </div>

    <div class="setting-item">
      <label>下午提醒</label>
      <div class="time-input">
        <input type="number" id="t2h" min="0" max="23" placeholder="时">
        <span>:</span>
        <input type="number" id="t2m" min="0" max="59" placeholder="分">
      </div>
    </div>

    <div class="setting-item">
      <label style="display:flex;align-items:center;gap:8px">
        日期提醒
        <input type="checkbox" id="dateEnabled" onchange="toggleDateInputs()" style="accent-color:#00ff88;margin:0;cursor:pointer">
        <span style="font-weight:normal">启用</span>
      </label>
      <div class="time-input">
        <input type="number" id="dateYr" min="2020" max="2099" placeholder="年" disabled>
        <span>年</span>
        <input type="number" id="dateMon" min="1" max="12" placeholder="月" disabled>
        <span>月</span>
        <input type="number" id="dateDay" min="1" max="31" placeholder="日" disabled>
        <span>日</span>
        <input type="number" id="dateHr" min="0" max="23" placeholder="时" disabled>
        <span>:</span>
        <input type="number" id="dateMin" min="0" max="59" placeholder="分" disabled>
      </div>
    </div>

    <div class="setting-item">
      <label>提醒日期</label>
      <div class="week-checkboxes">
        <label><input type="checkbox" value="1" checked> 周一</label>
        <label><input type="checkbox" value="2" checked> 周二</label>
        <label><input type="checkbox" value="3" checked> 周三</label>
        <label><input type="checkbox" value="4" checked> 周四</label>
        <label><input type="checkbox" value="5" checked> 周五</label>
        <label><input type="checkbox" value="6"> 周六</label>
        <label><input type="checkbox" value="0"> 周日</label>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-save" onclick="saveSettings()">保存设置</button>
      <button class="btn btn-test" onclick="showReminder()">立即测试提醒</button>
    </div>
    <div class="status" id="statusText"></div>
  </div>
</div>

<!-- ===== 提醒弹窗 ===== -->
<div id="reminderOverlay" onclick="closeReminder()">
  <div class="reminder-text">时间到了！</div>
  <button class="close-btn" onclick="closeReminder()">我知道了</button>
</div>

<!-- ===== 通知引导弹窗 ===== -->
<div id="notifyGuide">
  <div class="guide-card">
    <div class="guide-icon">🔔</div>
    <h2>开启通知提醒</h2>
    <p>开启通知后，即使锁屏也能收到<br>定时提醒，不会错过打卡时间。</p>
    <button class="guide-btn btn-enable" onclick="enableNotify()">开启通知</button>
    <button class="guide-btn btn-later" onclick="closeGuide()">暂不开启</button>
  </div>
</div>

<script>
// 加载设置
var settings = JSON.parse(localStorage.getItem('reminderSettings')) || {
  t1h: 9, t1m: 20,
  t2h: 18, t2m: 10,
  weeks: [1,2,3,4,5],
  dateEnabled: false,
  dateYr: 0, dateMon: 0, dateDay: 0, dateHr: 0, dateMin: 0
};
var lastTriggeredMinute = -1;
var notificationGranted = false;

// 通知引导弹窗
function showGuide() {
  document.getElementById('notifyGuide').classList.add('active');
}
function closeGuide() {
  document.getElementById('notifyGuide').classList.remove('active');
  localStorage.setItem('notifyGuideShown', '1');
}
function enableNotify() {
  closeGuide();
  if (!('Notification' in window)) return;
  Notification.requestPermission().then(function(p) {
    notificationGranted = (p === 'granted');
    if (notificationGranted) {
      var st = document.getElementById('statusText');
      st.textContent = '✅ 通知已开启！';
      setTimeout(function(){st.textContent='';},2000);
    }
  });
}

// 请求通知权限
function requestNotification() {
  if (!('Notification' in window)) return;
  if (Notification.permission === 'granted') {
    notificationGranted = true;
  } else if (Notification.permission === 'default') {
    if (!localStorage.getItem('notifyGuideShown')) {
      setTimeout(function() { showGuide(); }, 600);
    } else {
      Notification.requestPermission().then(function(p) {
        notificationGranted = (p === 'granted');
      });
    }
  }
}

// 发送系统通知
function sendNotification() {
  if (!notificationGranted && Notification.permission !== 'granted') return;
  notificationGranted = true;
  var n = new Notification('定时提醒', {
    body: '时间到了！',
    icon: 'icon-192.png',
    badge: 'icon-192.png',
    tag: 'punch-reminder',
    requireInteraction: true,
    vibrate: [200, 100, 200, 100, 200]
  });
  n.onclick = function() {
    window.focus();
    n.close();
  };
  setTimeout(function() { n.close(); }, 5000);
}

// 恢复设置页面的表单值
function restoreFormValues() {
  document.getElementById('t1h').value = settings.t1h;
  document.getElementById('t1m').value = settings.t1m;
  document.getElementById('t2h').value = settings.t2h;
  document.getElementById('t2m').value = settings.t2m;
  document.querySelectorAll('.week-checkboxes input').forEach(function(cb) {
    cb.checked = settings.weeks.includes(parseInt(cb.value));
  });
  document.getElementById('dateYr').value = settings.dateYr || '';
  document.getElementById('dateMon').value = settings.dateMon || '';
  document.getElementById('dateDay').value = settings.dateDay || '';
  document.getElementById('dateHr').value = settings.dateHr || '';
  document.getElementById('dateMin').value = settings.dateMin || '';
  document.getElementById('dateEnabled').checked = settings.dateEnabled;
  toggleDateInputs();
}

// 切换设置界面
function openSettings() {
  document.getElementById('settingsPage').classList.add('visible');
  restoreFormValues();
}
function closeSettings() {
  document.getElementById('settingsPage').classList.remove('visible');
}

// 切换日期提醒输入框
function toggleDateInputs() {
  var on = document.getElementById('dateEnabled').checked;
  if (!on) {
    var now = new Date();
    document.getElementById('dateYr').value = now.getFullYear();
    document.getElementById('dateMon').value = now.getMonth() + 1;
    document.getElementById('dateDay').value = now.getDate();
    document.getElementById('dateHr').value = now.getHours();
    document.getElementById('dateMin').value = now.getMinutes();
  }
  document.getElementById('dateYr').disabled = !on;
  document.getElementById('dateMon').disabled = !on;
  document.getElementById('dateDay').disabled = !on;
  document.getElementById('dateHr').disabled = !on;
  document.getElementById('dateMin').disabled = !on;
}

// 保存设置
function saveSettings() {
  settings.t1h = parseInt(document.getElementById('t1h').value) || 0;
  settings.t1m = parseInt(document.getElementById('t1m').value) || 0;
  settings.t2h = parseInt(document.getElementById('t2h').value) || 0;
  settings.t2m = parseInt(document.getElementById('t2m').value) || 0;

  settings.weeks = [];
  document.querySelectorAll('.week-checkboxes input:checked').forEach(function(cb) {
    settings.weeks.push(parseInt(cb.value));
  });

  settings.dateEnabled = document.getElementById('dateEnabled').checked;
  settings.dateYr = parseInt(document.getElementById('dateYr').value) || 0;
  settings.dateMon = parseInt(document.getElementById('dateMon').value) || 0;
  settings.dateDay = parseInt(document.getElementById('dateDay').value) || 0;
  settings.dateHr = parseInt(document.getElementById('dateHr').value) || 0;
  settings.dateMin = parseInt(document.getElementById('dateMin').value) || 0;

  localStorage.setItem('reminderSettings', JSON.stringify(settings));
  var st = document.getElementById('statusText');
  st.textContent = '✅ 设置已保存！';
  setTimeout(function(){st.textContent='';},2000);
}

// 显示提醒
function showReminder() {
  document.getElementById('reminderOverlay').classList.add('active');
  sendNotification();
  var ctx = new (window.AudioContext || window.webkitAudioContext)();
  var osc = ctx.createOscillator();
  osc.type = 'sine';
  osc.frequency.value = 800;
  osc.connect(ctx.destination);
  osc.start();
  setTimeout(function(){osc.stop();},500);
}

// 关闭提醒
function closeReminder() {
  document.getElementById('reminderOverlay').classList.remove('active');
}

// 时间更新
function checkTime() {
  var now = new Date();
  var h = now.getHours();
  var m = now.getMinutes();
  var s = now.getSeconds();
  var w = now.getDay();

  document.getElementById('mainTime').textContent =
    String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');

  var weekNames = ['日','一','二','三','四','五','六'];
  document.getElementById('mainDate').textContent =
    now.getFullYear() + '年' +
    String(now.getMonth()+1).padStart(2,'0') + '月' +
    String(now.getDate()).padStart(2,'0') + '日 星期' +
    weekNames[w];

  var minuteKey = h * 60 + m;
  if (minuteKey === lastTriggeredMinute) return;

  var shouldTrigger = false;

  if (settings.weeks.includes(w)) {
    if ((h === settings.t1h && m === settings.t1m) || (h === settings.t2h && m === settings.t2m)) {
      shouldTrigger = true;
    }
  }

  if (settings.dateEnabled && settings.dateYr > 0 && settings.dateMon > 0 && settings.dateDay > 0) {
    if (now.getFullYear() === settings.dateYr && now.getMonth()+1 === settings.dateMon && now.getDate() === settings.dateDay) {
      if (h === settings.dateHr && m === settings.dateMin) {
        shouldTrigger = true;
      }
    }
  }

  if (shouldTrigger) {
    lastTriggeredMinute = minuteKey;
    showReminder();
  }
}

// 页面启动：仅初始化通知、启动时钟，不修改设置弹窗状态
requestNotification();
setInterval(checkTime, 1000);

// 注册 Service Worker（PWA 离线缓存）
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('punch-sw.js').then(function(reg) {
    reg.addEventListener('updatefound', function() {
      var newWorker = reg.installing;
      newWorker.addEventListener('statechange', function() {
        if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
          console.log('新版本已缓存，刷新页面即可更新');
        }
      });
    });
  });
}
</script>
</body>
</html>
